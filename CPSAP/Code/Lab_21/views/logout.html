<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>You're logged out</title>
    <link rel="stylesheet" href="logout.css" />
</head>

<body class="logout-root">
    <div class="logout-card" role="main" aria-labelledby="logged-out-heading">
        <div class="logout-badge" aria-hidden="true">Signed out</div>

        <h1 id="logged-out-heading">Logged out</h1>

        <p>You have been logged out.</p>

        <a class="btn" href="/login" role="button">Login again</a>

        <div class="meta" aria-hidden="true">
            If you were expecting to remain signed in, try logging in again or contact an administrator.
        </div>
    </div>
</body>

</html>
